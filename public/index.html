<!DOCTYPE html>
<html>
<head>
    <title>Biche Messenger</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #000;
            color: white;
        }

        .center {
            text-align: center;
            margin-top: 100px;
        }

        input {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px;
            border: none;
            background: #0095f6;
            color: white;
            border-radius: 8px;
        }

        #app {
            display: none;
            height: 100vh;
            display: flex;
        }

        #users {
            width: 30%;
            background: #111;
            border-right: 1px solid #333;
            padding: 10px;
        }

        #chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .msg {
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            max-width: 60%;
        }

        .me {
            background: #0095f6;
            align-self: flex-end;
        }

        .other {
            background: #262626;
            align-self: flex-start;
        }

        #inputArea {
            display: flex;
            padding: 10px;
            background: #111;
        }

        #inputArea input {
            flex: 1;
        }
    </style>
</head>
<body>

<div id="login" class="center">
    <h2>Biche Messenger</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<div id="app">
    <div id="users">
        <h3>Users</h3>
        <input id="chatUser" placeholder="Enter username to chat">
        <button onclick="setUser()">Chat</button>
    </div>

    <div id="chat">
        <div id="messages"></div>

        <div id="inputArea">
            <input id="msg" placeholder="Message">
            <button onclick="send()">Send</button>
        </div>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
    const socket = io("https://biche-backend.onrender.com");
    let myName = "";
    let currentChat = "";

    async function register() {
        await fetch("https://biche-backend.onrender.com/register", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                username: username.value,
                password: password.value
            })
        });
        alert("Registered!");
    }

    async function login() {
        const res = await fetch("https://biche-backend.onrender.com/login", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                username: username.value,
                password: password.value
            })
        });

        const data = await res.json();

        myName = data.username;
        socket.emit("join", myName);

        loginDiv.style.display = "none";
        app.style.display = "flex";
    }

    function setUser() {
        currentChat = document.getElementById("chatUser").value;
    }

    function send() {
        const text = msg.value;
        socket.emit("private message", {
            to: currentChat,
            msg: text,
            from: myName
        });

        addMessage(text, "me");
        msg.value = "";
    }

    function addMessage(text, type) {
        const div = document.createElement("div");
        div.classList.add("msg", type);
        div.textContent = text;
        messages.appendChild(div);
    }

    socket.on("private message", ({from, msg}) => {
        addMessage(from + ": " + msg, "other");
    });
</script>

</body>
</html>
